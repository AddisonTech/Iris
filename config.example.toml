# Copy to config.toml (or use env vars / CLI flags) to configure Iris.

[broker]
host = "localhost"
port = 1883
topics = ["#"]          # MQTT topic filters to subscribe to

[clio]
url = "http://localhost:8010"   # Clio historian to forward readings to; "" disables

[api]
host = "127.0.0.1"
port = 8011
